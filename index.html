<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AniSecret — Your premium anime streaming destination. Watch the latest anime with Thai subtitles in HD quality." />
  <meta name="theme-color" content="#08080d" />
  <title>AniSecret — Anime Streaming</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🔮</text></svg>" />
</head>
<body>

  <!-- ═══ Navbar ═══ -->
  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">

      <!-- Brand -->
      <a href="#/" class="brand" id="brand-link">
        <span class="brand-name">AniSecret</span><sup class="brand-th">TH</sup>
      </a>

      <!-- Search -->
      <form class="search-wrapper" id="search-form" role="search">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search anime..."
          autocomplete="off"
          aria-label="Search anime"
        />
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </form>

      <!-- Nav Links -->
      <div class="nav-links">
        <a href="#/" class="nav-link active" data-page="home">Home</a>
      </div>

    </div>
  </nav>

  <!-- ═══ Main Content ═══ -->
  <main id="app">
    <!-- SPA pages render here -->
  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-brand">AniSecret<sup style="font-size:0.55em;opacity:0.7;color:#e84393;">TH</sup></div>
      <p class="footer-text">Powered by Alpha-Hen API • For educational purposes only</p>
    </div>
  </footer>

  <!-- ═══ App Scripts (ES Modules) ═══ -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
