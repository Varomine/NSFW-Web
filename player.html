<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anisecret Player</title>
  <!-- Load Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Customize Plyr CSS Variables to match Anisecret Theme */
    :root {
      --plyr-color-main: #9d4edd; /* Anisecret Accent Purple */
      --plyr-video-control-color-hover: #c77dff;
      --plyr-video-controls-background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
      --plyr-menu-background: rgba(20, 24, 33, 0.95);
      --plyr-menu-color: #f3f4f6;
      --plyr-menu-back-border-color: rgba(157, 78, 221, 0.2);
    }

    .plyr {
      width: 100%;
      height: 100%;
      max-height: 100%;
    }

    /* Message display (loading / error) */
    .status-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08090d;
      color: #9ca3af;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(157, 78, 221, 0.1);
      border-radius: 50%;
      border-top-color: #9d4edd;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.2);
    }

    .status-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .error-icon {
      font-size: 40px;
      color: #ff3333;
      margin-bottom: 16px;
    }

    .error-text {
      color: #ef4444;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      padding: 0 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="status-overlay" class="status-container">
    <div id="status-spinner" class="spinner"></div>
    <div id="status-text" class="status-text">Waking up API & loading stream...</div>
  </div>

  <video id="player" playsinline controls></video>

  <!-- Load Hls.js and Plyr CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const video = document.getElementById('player');
      const statusOverlay = document.getElementById('status-overlay');
      const statusText = document.getElementById('status-text');
      const statusSpinner = document.getElementById('status-spinner');

      // Parse parameters from query string
      const urlParams = new URLSearchParams(window.location.search);
      const videoSrc = urlParams.get('src');
      const title = urlParams.get('title') || 'Anisecret Stream';

      if (!videoSrc) {
        showError('No video stream source was provided.');
        return;
      }

      function showError(msg) {
        statusSpinner.style.display = 'none';
        statusOverlay.innerHTML = `
          <div class="error-icon">⚠️</div>
          <div class="error-text">${msg}</div>
        `;
        statusOverlay.style.opacity = '1';
        statusOverlay.style.pointerEvents = 'auto';
      }

      function hideStatus() {
        statusOverlay.style.opacity = '0';
        statusOverlay.style.pointerEvents = 'none';
      }

      // Default Plyr options
      const plyrOptions = {
        title: title,
        controls: [
          'play-large', 'play', 'progress', 'current-time', 
          'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'
        ],
        settings: ['quality', 'speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        keyboard: { focused: true, global: true },
        tooltips: { controls: true, seek: true }
      };

      let plyrPlayer;

      if (Hls.isSupported()) {
        const hls = new Hls({
          maxMaxBufferLength: 30,
          enableWorker: true,
          lowLatencyMode: true
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MEDIA_ATTACHED, () => {
          // Initialize Plyr
          plyrPlayer = new Plyr(video, plyrOptions);
          
          // Post messages to parent window for tracking events if necessary
          plyrPlayer.on('play', () => window.parent.postMessage({ event: 'play', title }, '*'));
          plyrPlayer.on('pause', () => window.parent.postMessage({ event: 'pause' }, '*'));
          plyrPlayer.on('ended', () => window.parent.postMessage({ event: 'ended' }, '*'));
        });

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideStatus();
          // Attempt autoplay
          plyrPlayer.play().catch(err => {
            console.log("Autoplay blocked by browser. User interaction required.");
          });
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                console.warn('Fatal network error encountered, trying to recover...', data);
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.warn('Fatal media error encountered, trying to recover...', data);
                hls.recoverMediaError();
                break;
              default:
                hls.destroy();
                showError('Fatal streaming error. Stream could not be parsed.');
                break;
            }
          }
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native support (Safari)
        video.src = videoSrc;
        plyrPlayer = new Plyr(video, plyrOptions);
        
        video.addEventListener('loadedmetadata', () => {
          hideStatus();
          plyrPlayer.play().catch(err => {
            console.log("Autoplay blocked by browser. User interaction required.");
          });
        });

        video.addEventListener('error', () => {
          showError('Native browser HLS player failed to play the video.');
        });
      } else {
        showError('Your browser does not support HLS (.m3u8) video streaming.');
      }
    });
  </script>
</body>
</html>
